<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Gmail linked</title>
  <style>
    body { font-family: system-ui, sans-serif; background: #0f1216; color: #e6e9ef; margin: 0; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .box { text-align: center; }
    .success { color: #22c55e; }
    a { color: #22c55e; }
  </style>
</head>
<body>
  <div class="box">
    <p class="success">Gmail linked successfully.</p>
    <p><a href="/">Go to app</a></p>
  </div>
  <script>
    var params = new URLSearchParams(window.location.search);
    if (params.get('linked') === '1') {
      sessionStorage.setItem('email-sender-just-linked', '1');
      sessionStorage.setItem('email-sender-signed-in', '1');
      var claim = params.get('claim');
      var target = '/?panel=dashboard&linked=1';
      if (claim) target += '&claim=' + encodeURIComponent(claim);
      setTimeout(function () { window.location.href = target; }, 400);
    }
  </script>
</body>
</html>
