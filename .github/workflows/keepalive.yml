name: Keep backend awake

on:
  schedule:
    - cron: '*/3 * * * *'   # every 5 minutes
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest

    steps:
      - name: Ping backend with retries
        env:
          BACKEND_URL: https://email-sender-dztw.onrender.com
        run: |
          echo "Pinging backend..."

          for i in {1..5}
          do
            if curl -s --max-time 90 "$BACKEND_URL/health"; then
              echo "Backend is awake"
              exit 0
            fi

            echo "Attempt $i failed. Retrying in 10s..."
            sleep 10
          done

          echo "Backend failed after retries"
          exit 1
