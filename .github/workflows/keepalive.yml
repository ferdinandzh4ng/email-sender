# Ping the backend every 10 minutes so Render free tier doesn't spin down
name: Keep backend awake
on:
  schedule:
    # Every 10 minutes
    - cron: '*/5 * * * *'
  workflow_dispatch: # Allow manual run from Actions tab
jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping backend health
        env:
          BACKEND_URL: https://email-sender-dztw.onrender.com
        run: |
          curl -sf --max-time 90 "$BACKEND_URL/health" && echo "OK" || exit 1
