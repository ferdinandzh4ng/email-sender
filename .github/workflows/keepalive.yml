# Ping the backend every 10 minutes so Render free tier doesn't spin down
name: Keep backend awake
on:
  schedule:
    # Every 10 minutes
    - cron: '*/10 * * * *'
  workflow_dispatch: # Allow manual run from Actions tab
jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping backend health
        env:
          BACKEND_URL: ${{ secrets.BACKEND_URL }}
        run: |
          if [ -z "$BACKEND_URL" ]; then echo "Set BACKEND_URL in repo Secrets"; exit 1; fi
          curl -sf --max-time 30 "$BACKEND_URL/health" && echo "OK" || exit 1
