<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0f1216;
      --bg-card: #1a1e26;
      --border: #2a303c;
      --text: #e6e9ef;
      --text-muted: #8b92a3;
      --accent: #22c55e;
      --accent-hover: #16a34a;
      --accent-dim: rgba(34, 197, 94, 0.15);
      --error: #ef4444;
      --radius: 8px;
    }
    * { box-sizing: border-box; }
    body {
      width: 300px;
      padding: 0;
      margin: 0;
      font-family: 'DM Sans', system-ui, sans-serif;
      font-size: 14px;
      background: var(--bg);
      color: var(--text);
    }
    .header {
      padding: 16px 16px 12px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .logo {
      width: 36px;
      height: 36px;
      background: var(--accent);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--bg);
      font-weight: 700;
      font-size: 18px;
    }
    .title { font-weight: 600; font-size: 15px; }
    .body { padding: 12px 16px 16px; }
    .btn {
      display: block;
      width: 100%;
      padding: 12px 16px;
      margin-bottom: 8px;
      border: none;
      border-radius: var(--radius);
      font: inherit;
      font-weight: 500;
      cursor: pointer;
      text-align: center;
      transition: background 0.15s, opacity 0.15s;
    }
    .btn:last-of-type { margin-bottom: 0; }
    .btn-secondary {
      background: var(--bg-card);
      color: var(--text);
      border: 1px solid var(--border);
    }
    .btn-secondary:hover { background: rgba(255,255,255,0.06); }
    .btn-primary {
      background: var(--accent);
      color: var(--bg);
    }
    .btn-primary:hover { background: var(--accent-hover); }
    #status {
      font-size: 12px;
      margin-top: 10px;
      padding-top: 10px;
      border-top: 1px solid var(--border);
      color: var(--text-muted);
    }
    #status.error { color: #ef4444; }
    #status.success { color: var(--accent); }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo">G</div>
    <span class="title">Campaign Sender</span>
  </div>
  <div class="body">
    <button type="button" class="btn btn-secondary" id="openOptions">Open Dashboard &amp; Campaigns</button>
    <button type="button" class="btn btn-primary" id="testSend">Send test email</button>
    <div id="status"></div>
  </div>
  <script src="shared.js"></script>
  <script src="popup.js"></script>
</body>
</html>
