<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body { width: 280px; padding: 12px; font-family: system-ui, sans-serif; font-size: 14px; margin: 0; }
    h2 { margin: 0 0 12px; font-size: 16px; }
    button { width: 100%; padding: 10px; margin: 6px 0; cursor: pointer; border: 1px solid #ccc; border-radius: 6px; background: #f5f5f5; }
    button.primary { background: #1a73e8; color: white; border-color: #1a73e8; }
    button:hover { background: #e8e8e8; }
    button.primary:hover { background: #1557b0; }
    #status { font-size: 12px; color: #666; margin-top: 8px; }
    .error { color: #c5221f; }
    .success { color: #137333; }
  </style>
</head>
<body>
  <h2>Gmail Campaign Sender</h2>
  <button id="openOptions">Open Dashboard &amp; Campaigns</button>
  <button id="testSend" class="primary">Send test email</button>
  <div id="status"></div>
  <script src="shared.js"></script>
  <script src="popup.js"></script>
</body>
</html>
